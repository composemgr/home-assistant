# nginx proxy address - http://172.17.0.1:8123

name: home-assistant
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: ghcr.io/home-assistant/home-assistant:stable
    pull_policy: always
    container_name: home-assistant-app
    restart: always
    logging: *default-logging
    network_mode: host
    privileged: true
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ./volumes/config/home-assistant:/config
      - /run/dbus:/run/dbus:ro

networks:
  home-assistant:
    name: home-assistant
    external: false
